name: Build Maohi Mod
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Fabric-Maohi-Player-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-repo

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.0'
          cache-disabled: true

      - name: Move private source to workspace
        run: |
          cp -r private-repo/. .
          rm -rf private-repo

      - name: Clean loom cache
        run: rm -rf ~/.gradle/caches/fabric-loom .gradle/loom-cache

      - name: Download Carpet jar
        run: |
          mkdir -p libs
          curl -L --retry 3 -o libs/fabric-carpet.jar \
            "https://cdn.modrinth.com/data/TQTTVgYE/versions/HzPcczDK/fabric-carpet-1.21.11-1.4.194%2Bv251223.jar"
          ls -lh libs/fabric-carpet.jar
          python3 -c "import zipfile; zipfile.ZipFile('libs/fabric-carpet.jar').testzip(); print('JAR OK')"

      - name: Build with Gradle
        run: gradle build --no-daemon
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR file: $JAR_FILE"

      - name: Delete existing release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
          files: ${{ steps.jar-name.outputs.jar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maohi-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 60
